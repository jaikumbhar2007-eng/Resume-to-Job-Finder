<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <meta property="og:title" content="Resume-to-Job Finder">
    <meta property="og:description" content="Upload your resume and let AI instantly match you with real-time job roles.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="{{ url_for('static', filename='og-image.png', _external=True) }}">
    <meta name="twitter:card" content="summary_large_image">

    <title>Resume Matcher</title>
</head>

<body class="landing-body">

    <!-- Background video, muted/looped. Falls back to the animated gradient
         blobs underneath if the video file is missing or fails to load. -->
    <div class="video-bg-wrapper">
        <video id="bg-video" autoplay muted loop playsinline
               onerror="this.style.display='none'">
            <source src="{{ url_for('static', filename='bg-video.mp4') }}" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="animated-background">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
    </div>

    <div class="landing-content">
        <div class="hero-header">
            <h1 class="stagger-1">Welcome to <span class="highlight">Resume-to-Job Finder</span></h1>
            <p class="stagger-2">Upload your resume and let AI instantly match you with real-time roles.</p>
        </div>

        <a href="/match" class="submit-btn start-btn">Start</a>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
